<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Rain for Vova</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #111;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  canvas.rain {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  main {
    position: relative;
    z-index: 1;
    max-width: 720px;
    background: rgba(255, 255, 255, 0.96);
    padding: 48px 40px;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }
  h1 {
    font-size: 42px;
    font-weight: 700;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: 17px;
    color: #5a5c7c;
    margin-bottom: 36px;
    line-height: 1.55;
  }
  .btn {
    display: inline-block;
    padding: 20px 48px;
    font-size: 19px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #ff6b6b 0%, #ffa94d 50%, #ffd93d 100%);
    border: none;
    border-radius: 14px;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(255, 107, 107, 0.5), 0 4px 12px rgba(255, 217, 61, 0.3);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    letter-spacing: 0.2px;
    background-size: 200% 100%;
    animation: shimmer 4s ease-in-out infinite;
  }
  .btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 18px 40px rgba(255, 107, 107, 0.6), 0 6px 16px rgba(255, 217, 61, 0.4);
  }
  .btn:active {
    transform: translateY(0) scale(1);
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .meta {
    margin-top: 28px;
    font-size: 13px;
    color: #8a8ca5;
  }
</style>
</head>
<body>
<canvas class="rain" id="rain"></canvas>
<main>
  <h1>Rain for Vova ☔</h1>
  <p class="subtitle">
    Результаты тестирования копилота на 173 вопросах<br>
    по корпоративной базе знаний MWS и HR-документам.
  </p>
  <a class="btn" href="report.html">Посмотреть результаты теста Confluence →</a>
  <p class="meta">Отчёт автогенерирован LLM-as-a-Judge · 2026-04-17</p>
</main>
<script>
(() => {
  const canvas = document.getElementById('rain');
  const ctx = canvas.getContext('2d');
  let W, H, drops;
  const resize = () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    drops = Array.from({length: 180}, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      l: 12 + Math.random() * 18,
      s: 8 + Math.random() * 10,
      o: 0.2 + Math.random() * 0.4,
    }));
  };
  resize();
  window.addEventListener('resize', resize);
  const tick = () => {
    ctx.clearRect(0, 0, W, H);
    ctx.lineCap = 'round';
    for (const d of drops) {
      ctx.strokeStyle = `rgba(200, 220, 255, ${d.o})`;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x, d.y + d.l);
      ctx.stroke();
      d.y += d.s;
      if (d.y > H) { d.y = -d.l; d.x = Math.random() * W; }
    }
    requestAnimationFrame(tick);
  };
  tick();
})();
</script>
</body>
</html>
